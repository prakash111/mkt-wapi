workflows:
  android-release:
    name: Android Release (AAB)
    max_build_duration: 120
    environment:
      node: 22.21.1
      java: 17
      vars:
        PACKAGE_NAME: "com.wapimobilenative"
    scripts:
      - name: Validate required environment variables
        script: |
          set -euo pipefail
          required_vars=(
            CM_KEYSTORE_B64
            CM_KEYSTORE_PASSWORD
            CM_KEY_ALIAS
            CM_KEY_PASSWORD
            CM_GOOGLE_SERVICES_JSON_B64
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required env var: ${var_name}"
              exit 1
            fi
          done

      - name: Prepare keystore and firebase config
        script: |
          set -euo pipefail

          echo "$CM_KEYSTORE_B64" | base64 --decode > /tmp/release.keystore
          echo "$CM_GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json

          {
            echo "CM_KEYSTORE_PATH=/tmp/release.keystore"
            echo "CM_KEYSTORE_PASSWORD=$CM_KEYSTORE_PASSWORD"
            echo "CM_KEY_ALIAS=$CM_KEY_ALIAS"
            echo "CM_KEY_PASSWORD=$CM_KEY_PASSWORD"
          } >> "$CM_ENV"

      - name: Install dependencies
        script: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint and typecheck
        script: |
          npm run lint
          npm run typecheck

      - name: Build Android App Bundle (Release)
        script: |
          cd android
          ./gradlew clean bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/mapping/release/mapping.txt